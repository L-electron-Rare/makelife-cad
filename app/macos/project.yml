name: MakelifeCAD
options:
  bundleIdPrefix: cc.saillant
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: MakelifeCAD/Bridge/MakelifeCAD-Bridging-Header.h
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/../../kicad-bridge/include
    LIBRARY_SEARCH_PATHS:
      - $(PROJECT_DIR)/../../kicad-bridge/build
    OTHER_LINKER_FLAGS:
      - -lkicad_bridge
    SWIFT_VERSION: "5.10"

targets:
  MakelifeCAD:
    type: application
    platform: macOS
    sources:
      - path: MakelifeCAD
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: cc.saillant.makelife-cad
        PRODUCT_NAME: MakelifeCAD
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
